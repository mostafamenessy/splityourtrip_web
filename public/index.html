    <script>
      // Some bundled third-party SDKs (e.g. Firebase Analytics/Installations)
      // reject an internal background promise with a raw { head, body } wire
      // envelope instead of an Error. This happens deep inside their minified
      // code, in a promise no application .catch() can reach. In production it
      // is harmless (just a console warning), but webpack-dev-server's dev
      // overlay renders it as a blocking "[object Object]" error screen.
      // This handler is declared in <head> so it registers BEFORE the webpack
      // client, letting it stopImmediatePropagation() the overlay's own
      // listener - but ONLY for this exact known shape. Every other rejection
      // propagates normally and still shows the overlay.
      window.addEventListener('unhandledrejection', function (event) {
        var reason = event.reason;
        if (reason && typeof reason === 'object' && 'head' in reason && 'body' in reason) {
          console.warn('Suppressed known third-party SDK internal rejection:', reason);
          event.preventDefault();
          event.stopImmediatePropagation();
        }
      });
    </script>
